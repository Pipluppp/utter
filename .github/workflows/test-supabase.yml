name: Supabase Tests

on:
  push:
    branches: [main, "refactor/backend-db-supabase"]
    paths:
      - "supabase/**"
      - ".github/workflows/test-supabase.yml"
  pull_request:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/test-supabase.yml"

jobs:
  database-tests:
    name: pgTAP Database Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.76.6

      - name: Start Supabase
        run: supabase start -x analytics,vector,pooler

      - name: Run pgTAP tests
        run: supabase test db

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
