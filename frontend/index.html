<!doctype html>
<html lang="en">

<head>
  <script type="module">
    if (import.meta.env.DEV) {
      import("react-grab");
    }
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/static/favicon-96x96.png?v=2026-03-29" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=2026-03-29" />
  <link rel="shortcut icon" href="/static/favicon.ico?v=2026-03-29" />
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png?v=2026-03-29" />
  <meta name="apple-mobile-web-app-title" content="Utter Voice" />
  <link rel="manifest" href="/static/site.webmanifest?v=2026-03-29" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Clone a voice and generate speech with Qwen3-TTS" />
  <meta name="theme-color" content="#ffffff" />

  <!-- LCP image preload -->
  <link rel="preload" as="image" type="image/webp" href="/static/utter_demo/frieren/still.webp" />
  <!-- Custom font preload -->
  <link rel="preload" as="font" type="font/woff2" crossorigin href="/static/fonts/GeistPixel-Line.woff2" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://uttervoice.com" />
  <meta property="og:title" content="Utter — Voice Cloning & Speech Generation" />
  <meta property="og:description" content="Clone any voice from audio and generate speech with AI." />
  <meta property="og:image" content="https://uttervoice.com/static/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Utter — Voice Cloning & Speech Generation" />
  <meta name="twitter:description" content="Clone any voice from audio and generate speech with AI." />
  <meta name="twitter:image" content="https://uttervoice.com/static/og-image.png" />

  <script>
    ; (() => {
      const STORAGE_KEY = 'utter_theme'
      const DARK_BG = '#0d0d0d'
      const LIGHT_BG = '#ffffff'

      let theme = null
      try {
        theme = localStorage.getItem(STORAGE_KEY)
      } catch {
        // ignore
      }
      const resolvedDark = theme === 'dark'

      const root = document.documentElement
      root.classList.toggle('dark', resolvedDark)
      root.style.colorScheme = resolvedDark ? 'dark' : 'light'

      const metaTheme = document.querySelector('meta[name="theme-color"]')
      if (metaTheme) metaTheme.setAttribute('content', resolvedDark ? DARK_BG : LIGHT_BG)
    })()
  </script>

  <!-- Geist Sans body font preload -->
  <link rel="preload" as="font" type="font/woff2" crossorigin
    href="/node_modules/geist/dist/fonts/geist-sans/Geist-Regular.woff2" />

  <title>Utter</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
