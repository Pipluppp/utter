#
# [[env.production.queues.producers]]
# queue = "tts-jobs"
# binding = "TTS_QUEUE"
#
# [[env.production.queues.consumers]]
# queue = "tts-jobs"
# max_batch_size = 1
# max_batch_timeout = 2
# max_retries = 3
# dead_letter_queue = "tts-jobs-dlq"

# Required Worker secrets (set via `wrangler secret put --env <name> ...`):
# - SUPABASE_URL
# - SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - STORAGE_SIGNING_SECRET
# - STRIPE_SECRET_KEY
# - STRIPE_WEBHOOK_SECRET
# - DASHSCOPE_API_KEY
